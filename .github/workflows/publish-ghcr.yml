name: Publish immutable Glyph image

on:
  workflow_dispatch:

concurrency:
  group: glyph-ghcr-publish
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/luckydevstar/glyph-rwkv-alpha0p8-hier256-b96
  MODEL_REPOSITORY: putty77/glyph-rwkv-alpha0p8-build-source
  MODEL_REVISION: b50b12b2fb937387180752797dc41ff0119828c7
  MODEL_FILENAME: selected-model.pth
  MODEL_SHA256: d59ff9c80e8a2eba56eeac38343bad5d90e9d439a3fc699dbdef53af0516929e

jobs:
  publish:
    name: Build and push linux/amd64 image
    if: >-
      github.repository == 'luckydevstar/glyph-rwkv-alpha0p8-hier256-b96' &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout the exact source revision
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Reclaim runner disk space
        run: scripts/free-disk-space.sh

      - name: Record reproducible-build epoch
        id: source
        shell: bash
        run: |
          set -euo pipefail
          epoch="$(git show -s --format=%ct "$GITHUB_SHA")"
          [[ "$epoch" =~ ^[0-9]+$ ]]
          echo "epoch=$epoch" >> "$GITHUB_OUTPUT"

      - name: Download and verify the public pinned model
        env:
          HF_MODEL_REPOSITORY: ${{ env.MODEL_REPOSITORY }}
          HF_MODEL_REVISION: ${{ env.MODEL_REVISION }}
          HF_MODEL_FILENAME: ${{ env.MODEL_FILENAME }}
          HF_MODEL_SHA256: ${{ env.MODEL_SHA256 }}
        run: scripts/fetch-model.sh

      - name: Verify checked-in codec files
        run: sha256sum --check SHA256SUMS

      - name: Log in to GHCR with the repository token
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          pull: true
          no-cache: true
          push: true
          provenance: false
          sbom: false
          tags: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          build-args: |
            SOURCE_DATE_EPOCH=${{ steps.source.outputs.epoch }}
            VCS_REVISION=${{ github.sha }}

      - name: Capture immutable image identity and manifest
        id: release
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_TAG: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          immutable_ref="${IMAGE_NAME}@${IMAGE_DIGEST}"

          mkdir -p release-metadata
          jq --arg image "$immutable_ref" '.image = $image' \
            manifest.template.json > release-metadata/manifest.json
          jq -n \
            --arg image "$immutable_ref" \
            --arg tag "$IMAGE_TAG" \
            --arg digest "$IMAGE_DIGEST" \
            --arg source_revision "$GITHUB_SHA" \
            --arg model_revision "$MODEL_REVISION" \
            --arg model_sha256 "$MODEL_SHA256" \
            '{image: $image, tag: $tag, digest: $digest,
              source_revision: $source_revision,
              model_revision: $model_revision,
              model_sha256: $model_sha256}' \
            > release-metadata/image.json

          {
            echo '## Immutable GHCR image'
            echo
            echo "- Image: \`$immutable_ref\`"
            echo "- Convenience tag: \`$IMAGE_TAG\`"
            echo "- Source commit: \`$GITHUB_SHA\`"
            echo "- Model revision: \`$MODEL_REVISION\`"
            echo "- Model SHA-256: \`$MODEL_SHA256\`"
            echo
            echo 'The digest reference, not the tag, is the submission identity.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: glyph-image-${{ github.sha }}
          path: release-metadata/
          if-no-files-found: error
          retention-days: 30
