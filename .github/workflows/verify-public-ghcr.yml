name: Verify anonymous GHCR digest pull

on:
  workflow_dispatch:
    inputs:
      digest:
        description: Published image digest (sha256:...)
        required: true
        type: string

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/luckydevstar/glyph-rwkv-alpha0p8-hier256-b96

jobs:
  verify:
    name: Pull with an empty Docker credential store
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout verifier
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Reclaim runner disk space
        run: scripts/free-disk-space.sh

      - name: Pull exact digest anonymously
        env:
          IMAGE_DIGEST: ${{ inputs.digest }}
        run: scripts/verify-anonymous-pull.sh "$IMAGE_NAME" "$IMAGE_DIGEST"
